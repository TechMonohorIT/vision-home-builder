<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Gallery</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap");

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        .featured-projects-section {
            background: url("../images/featured-projects-bg.png") no-repeat center center;
            background-size: cover;
            min-height: 771px;
            height: 100%;
            width: 100%;
        }

        .featured-projects-section-container {
            display: flex;
            overflow: hidden;
            padding: 40px 120px;
        }

        .featured-projects-section-container-2 {
            flex-direction: row-reverse;
        }

        .featured-projects-section-container-2 .gallery {
            justify-content: start;
        }

        .featured-projects-section-container-2 .rotated-title2 {
            position: absolute;
            top: -21px;
            right: 18px;
            height: 40px;
            width: 276px;
            transform: rotate(-90deg);
            transform-origin: right;
            color: #382213;
            font-size: 28px;
            font-weight: 600;
            line-height: 36.484px;
            text-transform: uppercase;
        }

        .details-panel {
            max-width: 422px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            color: #382213;
            font-size: 16px;
            font-weight: 500;
            line-height: 28px;
        }

        .rotated-title {
            position: absolute;
            top: 34%;
            left: 11px;
            transform: rotate(-90deg);
            transform-origin: left center;
            color: #382213;
            font-size: 28px;
            font-weight: 600;
            line-height: 36.484px;
            text-transform: uppercase;
        }

        .description-content {
            margin-top: 375px;
        }

        .gallery {
            display: flex;
            align-items: center;
            justify-content: end;
            gap: 10px;
            height: 100vh;
            width: 100%;
            transition: all 0.3s ease;
        }

        .project {
            position: relative;
            height: 100%;
            width: 166px;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            transition: width 0.4s ease;
        }

        .project.active {
            width: 422px;
        }

        .project img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .project-number {
            position: absolute;
            bottom: 20px;
            right: -6px;
            padding: 5px 10px;
            color: #fff;
            font-size: 96px;
            font-weight: 400;
            line-height: 120px;
            letter-spacing: 0.96px;
            text-transform: uppercase;
        }

        .project-label {
            position: absolute;
            top: 92px;
            right: -42px;
            background: #8c4c2e;
            color: white;
            padding: 10px 14px;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            transform: rotate(-90deg);
        }

        @media (max-width: 1441px) {
            .featured-projects-section-container {
                display: flex;
                column-gap: 40px;
            }
        }
    </style>
</head>

<body>
    <!-- Featured Projects Part One (1–3) -->
    <section class="featured-projects-section">
        <div class="featured-projects-section-container">
            <div class="details-panel">
                <div class="rotated-title" id="rotatedTitle1">1 - PROJECT NAME</div>
                <div class="description-content" id="projectDescription1"></div>
            </div>

            <div class="gallery" id="gallery1">
                <div class="project" onclick="selectProject(0, 1)">
                    <img src="./images/featured-projects-1.png" alt="Project 1">
                    <div class="project-number">1</div>
                    <div class="project-label">PROJECT NAME</div>
                </div>
                <div class="project" onclick="selectProject(1, 1)">
                    <img src="./images/about-us-image1.jpg" alt="Project 2">
                    <div class="project-number">2</div>
                    <div class="project-label">PROJECT NAME</div>
                </div>
                <div class="project" onclick="selectProject(2, 1)">
                    <img src="./images/about-us-image1.jpg" alt="Project 3">
                    <div class="project-number">3</div>
                    <div class="project-label">PROJECT NAME</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Featured Projects Part Two (4–6) -->
    <section class="featured-projects-section">
        <div class="featured-projects-section-container featured-projects-section-container-2">
            <div class="details-panel">
                <div class="rotated-title2" id="rotatedTitle2">4 - PROJECT NAME</div>
                <div class="description-content" id="projectDescription2"></div>
            </div>

            <div class="gallery" id="gallery2">
                <div class="project" onclick="selectProject(0, 2)">
                    <img src="./images/about-us-image1.jpg" alt="Project 4">
                    <div class="project-number">4</div>
                    <div class="project-label">PROJECT NAME</div>
                </div>
                <div class="project" onclick="selectProject(1, 2)">
                    <img src="./images/about-us-image1.jpg" alt="Project 5">
                    <div class="project-number">5</div>
                    <div class="project-label">PROJECT NAME</div>
                </div>
                <div class="project" onclick="selectProject(2, 2)">
                    <img src="./images/about-us-image1.jpg" alt="Project 6">
                    <div class="project-number">6</div>
                    <div class="project-label">PROJECT NAME</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Under Construction Projects -->
    <section class="featured-projects-section">
        <div class="featured-projects-section-container">
            <div class="details-panel">
                <div class="rotated-title" id="rotatedTitle3">1 - UNDER CONSTRUCTION</div>
                <div class="description-content" id="projectDescription3"></div>
            </div>

            <div class="gallery" id="gallery3">
                <div class="project" onclick="selectConstructionProject(0)">
                    <img src="./images/part2-img.png" alt="Under Construction 1">
                    <div class="project-number">1</div>
                    <div class="project-label">UNDER CONSTRUCTION</div>
                </div>
                <div class="project" onclick="selectConstructionProject(1)">
                    <img src="./images/part2-img.png" alt="Under Construction 2">
                    <div class="project-number">2</div>
                    <div class="project-label">UNDER CONSTRUCTION</div>
                </div>
                <div class="project" onclick="selectConstructionProject(2)">
                    <img src="./images/part2-img.png" alt="Under Construction 3">
                    <div class="project-number">3</div>
                    <div class="project-label">UNDER CONSTRUCTION</div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const allProjectsData = {
            1: [
                {
                    title: '1 - PROJECT NAME',
                    description: `In the evolving suburb of Melonba, this bespoke home is a standout example of contemporary suburban luxury. Featuring a bold mix of concrete render and matte finishes, the facade offers instant street appeal. Internally, the home is equally striking, with soaring ceilings and an open-concept layout that promotes natural flow.\n\nEvery space is finished with premium textures, from oak timber floors to custom stonework in the bathrooms. The kitchen features dual ovens, a walk-in pantry, and pendant lighting that elevates the entire room. With landscaped surrounds and a peaceful neighbourhood setting, this property is both modern and timeless.`
                },
                {
                    title: '2 - PROJECT NAME',
                    description: `This modern duplex combines function and flair in every corner. Set in a vibrant community, it offers smart design solutions like concealed storage and flexible living spaces.\n\nAn architectural staircase, sleek kitchen, and textured finishes enhance the overall design. Natural light floods every room thanks to full-height windows, and the backyard offers an ideal retreat for weekend relaxation.`
                },
                {
                    title: '3 - PROJECT NAME',
                    description: `A stylish urban sanctuary, this home is designed with sustainability and luxury in mind. Solar panels, recycled materials, and rainwater harvesting align with eco-conscious living.\n\nInside, polished concrete floors and minimalist design maximize space and light. Perfect for families or professionals, it blends city access with quiet comfort.`
                }
            ],
            2: [
                {
                    title: '4 - PROJECT NAME',
                    description: `This Marsden Park residence is a striking example of custom design done right. A commanding street presence gives way to interiors that are warm, inviting, and layered with texture. The living spaces are defined by open sightlines, with large windows framing views of the landscaped backyard. \n\nA chef's kitchen with a large island and walk-in pantry anchors the heart of the home. Upstairs, the master suite includes a private balcony, dressing room, and spa-style ensuite. Designed for seamless living, the entire home reflects Visionsmart Homes' commitment to excellence.`
                },
                {
                    title: '5 - PROJECT NAME',
                    description: `This Marsden Park residence is a striking example of custom design done right. A commanding street presence gives way to interiors that are warm, inviting, and layered with texture. The living spaces are defined by open sightlines, with large windows framing views of the landscaped backyard. \n\nA chef's kitchen with a large island and walk-in pantry anchors the heart of the home. Upstairs, the master suite includes a private balcony, dressing room, and spa-style ensuite. Designed for seamless living, the entire home reflects Visionsmart Homes' commitment to excellence.`
                },
                {
                    title: '6 - PROJECT NAME',
                    description: `This Marsden Park residence is a striking example of custom design done right. A commanding street presence gives way to interiors that are warm, inviting, and layered with texture. The living spaces are defined by open sightlines, with large windows framing views of the landscaped backyard. \n\nA chef's kitchen with a large island and walk-in pantry anchors the heart of the home. Upstairs, the master suite includes a private balcony, dressing room, and spa-style ensuite. Designed for seamless living, the entire home reflects Visionsmart Homes' commitment to excellence.`
                }
            ]
        };

        const underConstructionData = [
            {
                title: '1 - PROJECT LOCATIONS',
                description: `This project is currently under development. The foundation and framing are complete, with roofing scheduled for the coming weeks.\n\nDesigned for energy efficiency and modern aesthetics, this home promises to deliver exceptional comfort and design.`
            },
            {
                title: '2 - PROJECT LOCATIONS',
                description: `This multi-level duplex is halfway through its construction. Plumbing and electrical installations are underway.\n\nIt’s planned to feature a rooftop terrace, smart home integrations, and sustainable materials throughout.`
            },
            {
                title: '3 - PROJECT LOCATIONS',
                description: `In the initial stages of development, this project will bring a modern take to suburban housing. The land has been cleared, and excavation work has begun.\n\nExpected to be completed next year, this home will feature open-plan living and eco-friendly technologies.`
            }
        ];


        function selectProject(index, section) {
            const gallery = document.getElementById(`gallery${section}`);
            const titleEl = document.getElementById(`rotatedTitle${section}`);
            const descEl = document.getElementById(`projectDescription${section}`);
            const projects = gallery.querySelectorAll('.project');

            projects.forEach((proj, i) => {
                proj.classList.toggle('active', i === index);
            });

            const selected = allProjectsData[section][index];
            titleEl.innerText = selected.title;
            descEl.innerText = selected.description;
        }

        function selectConstructionProject(index) {
            const gallery = document.getElementById("gallery3");
            const titleEl = document.getElementById("rotatedTitle3");
            const descEl = document.getElementById("projectDescription3");
            const projects = gallery.querySelectorAll(".project");

            projects.forEach((proj, i) => {
                proj.classList.toggle("active", i === index);
            });

            const selected = underConstructionData[index];
            titleEl.innerText = selected.title;
            descEl.innerText = selected.description;
        }

        // Load default selections
        window.onload = () => {
            selectProject(0, 1);
            selectProject(2, 2);
            selectConstructionProject(0);
        };
    </script>
</body>

</html>
